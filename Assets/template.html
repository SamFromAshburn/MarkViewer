<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --heading-color: #569cd6;
            --link-color: #4ec9b0;
            --code-bg: #2d2d2d;
            --code-border: #444;
            --blockquote-border: #569cd6;
            --table-border: #444;
            --table-header-bg: #2d2d2d;
            --hr-color: #444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
            padding: 24px 40px;
            margin: 0;
            max-width: 960px;
            font-size: 15px;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--heading-color);
            margin-top: 1.4em;
            margin-bottom: 0.6em;
            font-weight: 600;
            line-height: 1.3;
        }

        h1 { font-size: 2em; border-bottom: 1px solid var(--hr-color); padding-bottom: 0.3em; }
        h2 { font-size: 1.5em; border-bottom: 1px solid var(--hr-color); padding-bottom: 0.3em; }
        h3 { font-size: 1.25em; }
        h4 { font-size: 1em; }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        p {
            margin: 0.8em 0;
        }

        code {
            background-color: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
            font-size: 0.9em;
        }

        pre {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 6px;
            padding: 16px;
            overflow-x: auto;
            line-height: 1.5;
        }

        pre code {
            padding: 0;
            background: none;
            font-size: 0.88em;
        }

        blockquote {
            border-left: 4px solid var(--blockquote-border);
            margin: 1em 0;
            padding: 0.5em 1em;
            background: rgba(86, 156, 214, 0.08);
            border-radius: 0 4px 4px 0;
        }

        blockquote p {
            margin: 0.4em 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }

        th, td {
            border: 1px solid var(--table-border);
            padding: 8px 12px;
            text-align: left;
        }

        th {
            background-color: var(--table-header-bg);
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: rgba(255,255,255,0.03);
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        hr {
            border: none;
            border-top: 1px solid var(--hr-color);
            margin: 2em 0;
        }

        ul, ol {
            padding-left: 1.8em;
        }

        li {
            margin: 0.3em 0;
        }

        /* Task lists */
        ul.contains-task-list {
            list-style: none;
            padding-left: 0.8em;
        }

        li.task-list-item input[type="checkbox"] {
            margin-right: 0.5em;
        }

        /* Mermaid diagrams */
        .mermaid {
            background: #282828;
            border-radius: 6px;
            padding: 16px;
            margin: 1em 0;
            text-align: center;
            overflow-x: auto;
        }

        /* Welcome screen */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            color: #666;
        }

        .welcome h1 {
            color: #569cd6;
            border: none;
            font-size: 2.5em;
        }

        .welcome p {
            font-size: 1.1em;
            max-width: 500px;
        }

        .welcome .shortcut {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 4px;
            padding: 2px 8px;
            font-family: monospace;
            font-size: 0.95em;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div id="content">
        <div class="welcome">
            <h1>📄 MarkViewer</h1>
            <p>Open a folder using the <span class="shortcut">📁 Open Folder</span> button, then select a markdown file from the explorer to start viewing.</p>
        </div>
    </div>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
        });

        window.renderContent = async function(html) {
            const contentEl = document.getElementById('content');
            contentEl.innerHTML = html;

            // Find all code blocks with language "mermaid" and convert them
            const codeBlocks = contentEl.querySelectorAll('pre > code.language-mermaid');
            for (const block of codeBlocks) {
                const pre = block.parentElement;
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = block.textContent;
                pre.replaceWith(mermaidDiv);
            }

            // Also handle <div class="mermaid"> that Markdig might produce
            const mermaidDivs = contentEl.querySelectorAll('.mermaid');
            if (mermaidDivs.length > 0) {
                try {
                    await mermaid.run({ nodes: mermaidDivs });
                } catch (e) {
                    console.error('Mermaid rendering error:', e);
                }
            }

            // Scroll to top
            window.scrollTo(0, 0);
        };
    </script>
</body>
</html>
